<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>proposal.md — Quickfix Workflow</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f7f6f3;
    --color-background-tertiary: #f0efe8;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-border-tertiary: rgba(0,0,0,0.12);
    --color-border-secondary: rgba(0,0,0,0.22);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1e1e1c;
      --color-background-secondary: #252523;
      --color-background-tertiary: #2c2c2a;
      --color-text-primary: #e8e6df;
      --color-text-secondary: #a8a69f;
      --color-text-tertiary: #6e6d69;
      --color-border-tertiary: rgba(255,255,255,0.10);
      --color-border-secondary: rgba(255,255,255,0.18);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:var(--font-mono);font-size:13px;line-height:1.6;background:var(--color-background-primary);color:var(--color-text-primary)}
  #root{display:flex;flex-direction:column;height:100vh;min-height:740px}
  .tbar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-shrink:0}
  .tab{padding:4px 12px;border-radius:4px;font-size:12px;color:var(--color-text-tertiary);border:0.5px solid transparent;display:flex;align-items:center;gap:5px;font-family:var(--font-sans)}
  .tab.on{background:var(--color-background-primary);border-color:var(--color-border-tertiary);color:var(--color-text-primary)}
  .ti{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .parea{display:flex;align-items:center;gap:8px;margin-left:auto;font-family:var(--font-sans)}
  .plabel{font-size:11px;color:var(--color-text-tertiary);white-space:nowrap}
  .ptrack{width:110px;height:3px;background:var(--color-background-tertiary);border-radius:2px;overflow:hidden}
  .pfill{height:100%;background:#639922;border-radius:2px;transition:width 0.5s ease}
  .main{display:flex;flex:1;overflow:hidden}
  .ed{flex:1;overflow-y:auto;padding:10px 0}
  .sb{width:292px;min-width:230px;border-left:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden;background:var(--color-background-secondary);font-family:var(--font-sans)}
  .sbh{padding:9px 14px;font-size:11px;font-weight:500;letter-spacing:0.04em;color:var(--color-text-secondary);text-transform:uppercase;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .il{flex:1;overflow-y:auto}
  .ii{padding:8px 14px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;display:flex;gap:8px;align-items:flex-start}
  .ii:hover:not(.done){background:var(--color-background-primary)}
  .ii.sel{background:var(--color-background-primary);border-left:2px solid #378ADD}
  .ii.done{opacity:0.4;cursor:default}
  .idot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .idot.w{background:#EF9F27}.idot.e{background:#E24B4A}.idot.i2{background:#378ADD}.idot.ok{background:#639922}
  .itxt{font-size:11px;color:var(--color-text-primary);font-weight:500;line-height:1.3;margin-bottom:2px}
  .itxt.done{text-decoration:line-through;color:var(--color-text-tertiary)}
  .imeta{font-size:10px;color:var(--color-text-tertiary);display:flex;gap:4px;align-items:center}
  .iref{font-family:var(--font-mono);background:var(--color-background-tertiary);padding:0 4px;border-radius:2px}
  .ibadge{padding:0 5px;border-radius:3px;font-weight:500}
  .ibadge.e{background:#FCEBEB;color:#A32D2D}.ibadge.w{background:#FAEEDA;color:#854F0B}.ibadge.i2{background:#E6F1FB;color:#185FA5}
  .cta{padding:10px 14px;border-top:0.5px solid var(--color-border-tertiary);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
  .stbar{display:flex;align-items:center;gap:10px;padding:4px 14px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-shrink:0;font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-sans)}
  .sdot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px}
  .vsep{color:var(--color-border-secondary);margin:0 2px}

  .lg{position:relative}
  .lr{display:flex;align-items:flex-start;min-height:22px;cursor:default;position:relative}
  .lr:hover{background:rgba(127,119,221,0.04)}
  .lr.sel{background:rgba(55,138,221,0.07)}
  .lr.res{border-left:2px solid #639922}
  .lr.el{background:rgba(226,75,74,0.04)}
  .lr.wl{background:rgba(239,159,39,0.04)}
  .lr.il2{background:rgba(55,138,221,0.04)}
  .lnum{width:44px;min-width:44px;text-align:right;padding-right:12px;font-size:11px;color:var(--color-text-tertiary);user-select:none;line-height:22px}
  .lcode{flex:1;padding:0 14px 0 4px;word-break:break-word;line-height:22px;color:var(--color-text-primary);position:relative}
  .uw{background:linear-gradient(to right,transparent 50%,#EF9F27 50%) 0 100%/4px 2px repeat-x;cursor:pointer}
  .ue{background:linear-gradient(to right,transparent 50%,#E24B4A 50%) 0 100%/4px 2px repeat-x;cursor:pointer}
  .ui{background:linear-gradient(to right,transparent 50%,#378ADD 50%) 0 100%/4px 2px repeat-x;cursor:pointer}
  .gi{position:absolute;left:-18px;top:3px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;cursor:pointer;font-family:var(--font-sans);user-select:none}
  .gi.w{background:#EF9F27;color:#fff}.gi.e{background:#E24B4A;color:#fff}.gi.i{background:#378ADD;color:#fff}.gi.ok{background:#639922;color:#fff}
  .gn{position:absolute;left:-2px;top:3px;font-size:8px;color:var(--color-text-tertiary);font-family:var(--font-sans);line-height:14px;pointer-events:none}

  .an{display:flex;min-height:20px;animation:fsi 0.25s ease}
  .an-ln{width:44px;min-width:44px;text-align:right;padding-right:12px;font-size:11px;color:var(--color-text-tertiary);user-select:none;line-height:20px;opacity:0.35}
  .an-code{flex:1;padding:1px 14px 1px 4px;font-size:11px;color:#27500A;line-height:20px;font-family:var(--font-mono);background:rgba(99,153,34,0.07);border-left:2px solid #97C459}
  @media(prefers-color-scheme:dark){.an-code{color:#C0DD97;background:rgba(99,153,34,0.12);border-left-color:#3B6D11}}

  .qfp{margin:3px 14px 5px 44px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);overflow:hidden;animation:fsi 0.18s ease}
  .qfp.w{border-left:3px solid #EF9F27}.qfp.e{border-left:3px solid #E24B4A}.qfp.i{border-left:3px solid #378ADD}
  .qfp-body{padding:11px 13px;font-family:var(--font-sans)}
  .qfp-hd{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .qfp-tag{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
  .qfp-tag.w{background:#FAEEDA;color:#854F0B}.qfp-tag.e{background:#FCEBEB;color:#A32D2D}.qfp-tag.i{background:#E6F1FB;color:#185FA5}
  .qfp-title{font-size:12px;font-weight:500;color:var(--color-text-primary)}
  .qlabel{font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-tertiary);margin-bottom:3px}
  .qfp-q{font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:8px}
  .qfp-r{font-size:11px;font-family:var(--font-mono);background:var(--color-background-secondary);padding:6px 8px;color:var(--color-text-primary);line-height:1.5;margin-bottom:10px;border-radius:4px}
  .qfp-acts{display:flex;gap:6px}
  .bapply{padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);font-family:var(--font-sans)}
  .bapply:hover{opacity:0.82}
  .bdismiss{padding:5px 11px;font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-family:var(--font-sans)}
  .bdismiss:hover{background:var(--color-background-secondary)}

  @keyframes fsi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

  .rv{flex:1;overflow-y:auto;padding:18px 22px;font-family:var(--font-sans);animation:fsi 0.3s ease}
  .rv-pill{display:inline-flex;align-items:center;gap:5px;background:#EAF3DE;color:#27500A;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:14px}
  @media(prefers-color-scheme:dark){.rv-pill{background:#27500A;color:#C0DD97}}
  .rv h2{font-size:13px;font-weight:500;color:var(--color-text-primary);margin:16px 0 7px;padding-bottom:5px;border-bottom:0.5px solid var(--color-border-tertiary)}
  .rv h2:first-of-type{margin-top:0}
  .rv table{width:100%;border-collapse:collapse;margin:5px 0;font-size:11px;table-layout:fixed}
  .rv th{text-align:left;padding:5px 7px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.03em}
  .rv td{padding:5px 7px;border:0.5px solid var(--color-border-tertiary);vertical-align:top;color:var(--color-text-secondary);line-height:1.5;word-break:break-word}
  .rv td:first-child{color:var(--color-text-primary);font-weight:500;width:36%}
  .rv code{font-family:var(--font-mono);font-size:10px;background:var(--color-background-secondary);padding:1px 3px;border-radius:3px}
  .rv li{margin:3px 0;font-size:11px;color:var(--color-text-secondary);line-height:1.5}
  .rv ul{padding-left:15px;margin:4px 0}
  .rv .rval{color:#27500A;font-weight:500}
  @media(prefers-color-scheme:dark){.rv .rval{color:#97C459}}

  .sb-success{padding:14px;display:flex;flex-direction:column;gap:6px}
  .sb-stat{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
  .sb-stat-l{color:var(--color-text-tertiary)}
  .sb-stat-v{color:var(--color-text-primary);font-weight:500}
</style>
</head>
<body>
<div id="root">
  <div class="tbar" id="tbar"></div>
  <div class="main" id="main"></div>
  <div class="stbar" id="stbar"></div>
</div>

<script>
const LINES=[
  {id:0,text:'Implement batch job with Spring Batch with JDBC to import temperature data from csv files into database:',issues:['csv-plural']},
  {id:1,text:'1. Extract "name", "datetime", and "temp" columns from the csv file',issues:['datetime-format','temp-type']},
  {id:2,text:'2. The "name" and "datetime" columns are unique pair.',issues:['dup-scope']},
  {id:3,text:'3. The duplicate entries should be reported and ignored.',issues:['reported-meaning']},
  {id:4,text:'4. Print the summary, how many records were inserted to the database, and how many duplicates were detected.',issues:['summary-target']},
  {id:5,text:'5. Use Testcontainers for integration testing',issues:['db-missing','path-missing','error-handling','scheduling','scale']},
];

const ISSUES={
  'csv-plural':{id:'csv-plural',t:'w',lid:0,span:'csv files',title:'"csv files" \u2014 single or multiple per run?',sec:'Ambiguity',q:'Does the job process a single CSV file per run, or multiple files from a directory? If multiple, sequential or parallel?',res:'Single file per run. Path passed as --filePath=path/to/data.csv job parameter. Multiple files require separate job instances.',ann:'// single file per run \u2014 --filePath=path/to/data.csv job param (fails fast if missing)'},
  'datetime-format':{id:'datetime-format',t:'w',lid:1,span:'datetime',title:'Datetime column format unspecified',sec:'Ambiguity',q:'What format is the datetime in the CSV? ISO 8601? Custom pattern? Does it include timezone?',res:'yyyy-MM-dd HH:mm:ss (no timezone). Stored as MySQL DATETIME.',ann:'// datetime: yyyy-MM-dd HH:mm:ss \u2014 no timezone, stored as MySQL DATETIME'},
  'temp-type':{id:'temp-type',t:'w',lid:1,span:'"temp"',title:'Temperature column type unspecified',sec:'Ambiguity',q:'Is temp a decimal (e.g. 23.5), integer, or string? What unit \u2014 Celsius, Fahrenheit, Kelvin?',res:'DECIMAL(6,2). Supports -273.15 to 999.99. Unit not enforced \u2014 stored as-is.',ann:'// temp: DECIMAL(6,2) \u2014 range \xb19999.99, unit stored as-is'},
  'dup-scope':{id:'dup-scope',t:'i',lid:2,span:'"name" and "datetime"',title:'Duplicate detection scope unclear',sec:'Q5',q:'Against existing DB records only, or also within the same CSV file?',res:'DB-level only via UNIQUE(name, datetime) constraint. DuplicateKeyException caught at write time. No in-memory deduplication.',ann:'// duplicates: DB-level via UNIQUE(name, datetime) \u2014 DuplicateKeyException on write'},
  'reported-meaning':{id:'reported-meaning',t:'w',lid:3,span:'reported',title:'"Reported" is ambiguous',sec:'Ambiguity',q:'Logged to console, written to a reject file, or stored in a DB table? Per-file or per-run?',res:'Logged via SLF4J WARN per duplicate (name + datetime). No reject file. Count included in final summary.',ann:'// reported = SLF4J WARN per duplicate (name + datetime) \u2014 counted in summary'},
  'summary-target':{id:'summary-target',t:'w',lid:4,span:'Print the summary',title:'Summary output target unspecified',sec:'Ambiguity',q:'stdout? log only? job execution result? Where exactly?',res:'JobExecutionListener#afterJob \u2014 SLF4J INFO + stdout. Format: Inserted: N, Duplicates skipped: M.',ann:'// summary: JobExecutionListener#afterJob \u2192 SLF4J INFO + stdout'},
  'db-missing':{id:'db-missing',t:'e',lid:5,span:'Testcontainers',title:'Database engine not specified',sec:'Missing',q:'Which database \u2014 PostgreSQL, MySQL, or H2? Testcontainers image, SQL dialect, DDL, and JDBC driver all depend on this.',res:'MySQL. Testcontainers image: mysql:8.0. Schema managed by Flyway. Unique constraint in V1 migration.',ann:'// DB: MySQL \u2014 Testcontainers mysql:8.0, schema via Flyway V1__create_temperature_reading.sql'},
  'path-missing':{id:'path-missing',t:'e',lid:5,span:'Testcontainers',title:'CSV file path provision undefined',sec:'Missing',q:'How is the input CSV path provided \u2014 CLI argument, application property, or watched directory?',res:'CLI job parameter: --filePath=path/to/data.csv. Validated at startup \u2014 job fails fast if file missing.',ann:'// CSV path: --filePath=path/to/data.csv CLI arg \u2014 validated at startup'},
  'error-handling':{id:'error-handling',t:'e',lid:5,span:'integration testing',title:'No error handling strategy defined',sec:'Missing',q:'What happens when a row has missing fields, bad datetime, or non-numeric temp \u2014 skip or fail?',res:'Skip with WARN log. Configurable skip limit (default: 10). Exceeding the limit fails the job.',ann:'// invalid rows: skip + WARN log \u2014 skip-limit=10 configurable (job fails if exceeded)'},
  'scheduling':{id:'scheduling',t:'i',lid:5,span:'integration',title:'Job scheduling mode not specified',sec:'Missing',q:'One-time run on startup, triggered on demand, or cron-scheduled?',res:'One-time run on startup. spring.batch.job.enabled=true. No cron scheduling.',ann:'// scheduling: one-time on startup \u2014 spring.batch.job.enabled=true'},
  'scale':{id:'scale',t:'i',lid:5,span:'testing',title:'Expected file scale not specified',sec:'Missing',q:'Thousands of rows? Millions? Affects chunk size and whether partitioning is needed.',res:'Chunk size 100 (configurable via batch.chunk-size property). Memory-safe for millions of rows.',ann:'// chunk-size=100 (batch.chunk-size) \u2014 bounded memory, safe for millions of rows'},
};

const ORDER=['csv-plural','datetime-format','temp-type','reported-meaning','summary-target','db-missing','path-missing','error-handling','dup-scope','scheduling','scale'];
const TOTAL=ORDER.length;

let resolved=new Set(), selected=null, phase='fixing';

function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderAll(){renderTbar();renderMain();renderStbar();}

function renderTbar(){
  const done=resolved.size, pct=Math.round(done/TOTAL*100);
  document.getElementById('tbar').innerHTML=`
    <div class="tab ${phase==='fixing'?'on':''}" ><span class="ti" style="background:#5DCAA5"></span>proposal.md</div>
    <div class="tab ${phase==='refined'?'on':''}" ><span class="ti" style="background:#97C459"></span>refined.md</div>
    <div style="flex:1"></div>
    <div class="parea">
      <span class="plabel">${done} / ${TOTAL} fixed</span>
      <div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div>
    </div>`;
}

function renderMain(){
  const el=document.getElementById('main');
  if(phase==='refined'){
    el.innerHTML=`<div class="rv" id="rv">${refinedHTML()}</div><div class="sb">${refinedSidebarHTML()}</div>`;
    return;
  }
  el.innerHTML=`<div class="ed" id="ea">${editorHTML()}</div><div class="sb">${sidebarHTML()}</div>`;
  document.getElementById('ea').addEventListener('click',onEditorClick);
  document.getElementById('sbil').addEventListener('click',onSidebarClick);
  const aa=document.getElementById('baa'); if(aa) aa.addEventListener('click',applyAll);
  const gen=document.getElementById('bgen'); if(gen) gen.addEventListener('click',()=>{phase='refined';renderAll();});
}

function editorHTML(){
  return '<div style="padding:0 0 0 20px;position:relative">'+LINES.map(renderLineGroup).join('')+'</div>';
}

function renderLineGroup(line){
  const lis=line.issues.map(id=>ISSUES[id]);
  const unres=lis.filter(x=>!resolved.has(x.id));
  const res2=lis.filter(x=>resolved.has(x.id));
  const full=unres.length===0&&lis.length>0;
  const isSelected=selected&&lis.some(x=>x.id===selected);
  const hasE=unres.some(x=>x.t==='e'), hasW=unres.some(x=>x.t==='w'), hasI=unres.some(x=>x.t==='i');
  let cls='lr'+(full?' res':hasE?' el':hasW?' wl':hasI?' il2':'')+(isSelected?' sel':'');

  let txt=h(line.text);
  if(unres.length>0){
    const fst=unres[0];
    const sp=h(fst.span);
    const uc=fst.t==='e'?'ue':fst.t==='w'?'uw':'ui';
    txt=txt.replace(sp,`<span class="${uc}" data-issue="${fst.id}">${sp}</span>`);
    if(unres.length>1&&line.id===1){
      const sec=unres[1];
      const sp2=h(sec.span);
      const uc2=sec.t==='e'?'ue':sec.t==='w'?'uw':'ui';
      txt=txt.replace(sp2,`<span class="${uc2}" data-issue="${sec.id}">${sp2}</span>`);
    }
  }

  let gi='';
  if(full&&lis.length>0){
    gi=`<span class="gi ok">&#10003;</span>`;
  } else if(unres.length>0){
    const f=unres[0]; const gt=f.t==='e'?'e':f.t==='w'?'w':'i';
    const sym=f.t==='e'?'!':f.t==='w'?'&#9651;':'i';
    gi=`<span class="gi ${gt}" data-issue="${f.id}">${sym}</span>`;
    if(unres.length>1) gi+=`<span class="gn">+${unres.length-1}</span>`;
  }

  const anRows=res2.map(iss=>`<div class="an"><div class="an-ln">&nbsp;</div><div class="an-code">${h(iss.ann)}</div></div>`).join('');

  let qfHtml='';
  if(selected&&lis.some(x=>x.id===selected)){
    const iss=ISSUES[selected]; const tc=iss.t==='e'?'e':iss.t==='w'?'w':'i';
    const blabel=iss.t==='e'?'Missing info':iss.t==='w'?'Ambiguity':'Edge case';
    qfHtml=`<div class="qfp ${tc}"><div class="qfp-body">
      <div class="qfp-hd"><span class="qfp-tag ${tc}">${blabel}</span><span class="qfp-title">${h(iss.title)}</span></div>
      <div class="qlabel">Open question</div>
      <div class="qfp-q">${h(iss.q)}</div>
      <div class="qlabel">Resolution</div>
      <div class="qfp-r">${h(iss.res)}</div>
      <div class="qfp-acts">
        <button class="bapply" data-apply="${iss.id}">Apply fix</button>
        <button class="bdismiss" data-dismiss="1">Dismiss</button>
      </div>
    </div></div>`;
  }

  return `<div class="lg" data-lid="${line.id}"><div class="${cls}"><div class="lnum">${line.id+1}</div><div class="lcode">${gi}${txt}</div></div>${anRows}${qfHtml}</div>`;
}

function sidebarHTML(){
  const remaining=TOTAL-resolved.size;
  const ec=ORDER.filter(id=>!resolved.has(id)&&ISSUES[id].t==='e').length;
  const wc=ORDER.filter(id=>!resolved.has(id)&&ISSUES[id].t==='w').length;
  const list=ORDER.map(id=>{
    const iss=ISSUES[id]; const done=resolved.has(id); const sel=selected===id;
    const tc=iss.t==='e'?'e':iss.t==='w'?'w':'i2'; const dc=done?'ok':tc;
    return `<div class="ii${done?' done':''}${sel?' sel':''}" data-issue="${id}">
      <div class="idot ${dc}"></div>
      <div style="flex:1;min-width:0">
        <div class="itxt${done?' done':''}">${done?'&#10003; ':''}${h(iss.title)}</div>
        <div class="imeta"><span class="iref">L${iss.lid+1}</span><span class="ibadge ${tc}">${iss.sec}</span></div>
      </div></div>`;
  }).join('');
  const hdr=`<div class="sbh"><span>Quick Fixes</span><div style="display:flex;gap:3px"><span style="font-size:10px;padding:1px 5px;border-radius:10px;font-weight:500;background:#FCEBEB;color:#A32D2D">${ec} err</span><span style="font-size:10px;padding:1px 5px;border-radius:10px;font-weight:500;background:#FAEEDA;color:#854F0B">${wc} warn</span></div></div>`;
  let ctaHtml='';
  if(resolved.size===TOTAL){
    ctaHtml=`<button id="bgen" style="width:100%;padding:8px;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;cursor:pointer;background:var(--color-text-primary);color:var(--color-background-primary);border:none;font-family:var(--font-sans)">Generate refined spec \u2192</button>`;
  } else {
    ctaHtml=`<button id="baa" style="width:100%;padding:6px;border-radius:var(--border-radius-md);font-size:11px;cursor:pointer;background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);font-family:var(--font-sans)">Apply all ${remaining} remaining</button>`;
  }
  return `${hdr}<div class="il" id="sbil">${list}</div><div class="cta">${ctaHtml}</div>`;
}

function onEditorClick(e){
  const ab=e.target.closest('[data-apply]'); if(ab){applyFix(ab.dataset.apply);return;}
  const db=e.target.closest('[data-dismiss]'); if(db){selected=null;renderAll();return;}
  const sp=e.target.closest('[data-issue]'); if(sp){selectIssue(sp.dataset.issue);return;}
  const gi=e.target.closest('.gi[data-issue]'); if(gi){selectIssue(gi.dataset.issue);return;}
}

function onSidebarClick(e){
  const it=e.target.closest('.ii:not(.done)'); if(it) selectIssue(it.dataset.issue);
}

function selectIssue(id){
  if(!id||!ISSUES[id]||resolved.has(id)) return;
  selected=id; renderAll();
  const lg=document.querySelector(`.lg[data-lid="${ISSUES[id].lid}"]`);
  if(lg) lg.scrollIntoView({block:'center',behavior:'smooth'});
  const si=document.querySelector(`#sbil .ii[data-issue="${id}"]`);
  if(si) si.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function applyFix(id){
  if(!id||!ISSUES[id]) return;
  resolved.add(id); selected=null;
  renderAll();
  const next=ORDER.find(i=>!resolved.has(i));
  if(next) setTimeout(()=>selectIssue(next),140);
}

function applyAll(){
  ORDER.forEach(id=>resolved.add(id)); selected=null; renderAll();
}

function renderStbar(){
  const done=resolved.size;
  const ec=ORDER.filter(id=>!resolved.has(id)&&ISSUES[id].t==='e').length;
  const wc=ORDER.filter(id=>!resolved.has(id)&&ISSUES[id].t==='w').length;
  document.getElementById('stbar').innerHTML=`
    <span><span class="sdot" style="background:#E24B4A"></span>${ec} errors</span>
    <span><span class="sdot" style="background:#EF9F27"></span>${wc} warnings</span>
    <span><span class="sdot" style="background:#639922"></span>${done} resolved</span>
    <div style="flex:1"></div>
    <span>Markdown</span><span class="vsep">|</span><span>UTF-8</span><span class="vsep">|</span>
    <span>${phase==='refined'?'refined.md':'proposal.md'}</span>`;
}

function refinedHTML(){
  return `<div class="rv-pill">&#10003; All ${TOTAL} issues resolved &mdash; refined.md</div>
  <h2>1. Ambiguities &mdash; Resolved</h2>
  <table><tr><th style="width:36%">Ambiguity</th><th>Resolution</th></tr>
  <tr><td>"CSV files" (plural)</td><td class="rval">Single file per run. Path via <code>--filePath=path/to/data.csv</code>.</td></tr>
  <tr><td>"reported" &mdash; what does it mean?</td><td class="rval">SLF4J <code>WARN</code> per duplicate (name + datetime). No reject file.</td></tr>
  <tr><td>"Print the summary" &mdash; where?</td><td class="rval"><code>JobExecutionListener#afterJob</code> &rarr; SLF4J INFO + stdout.</td></tr>
  <tr><td>"temp" column &mdash; type?</td><td class="rval"><code>DECIMAL(6,2)</code>. Range -273.15 to 999.99. Unit not enforced.</td></tr>
  <tr><td>"datetime" &mdash; format?</td><td class="rval"><code>yyyy-MM-dd HH:mm:ss</code> (no timezone). MySQL <code>DATETIME</code>.</td></tr>
  </table>
  <h2>2. Missing information &mdash; Resolved</h2>
  <table><tr><th style="width:36%">Gap</th><th>Decision</th></tr>
  <tr><td>Database type</td><td class="rval">MySQL. Testcontainers <code>mysql:8.0</code>. Schema via Flyway.</td></tr>
  <tr><td>CSV file path</td><td class="rval"><code>--filePath=...</code> CLI parameter. Fails fast if missing.</td></tr>
  <tr><td>Error handling</td><td class="rval">Skip + WARN log. Skip limit 10 (configurable). Exceeding limit fails job.</td></tr>
  <tr><td>CSV format</td><td class="rval">Comma-delimited, UTF-8, header row (<code>linesToSkip=1</code>).</td></tr>
  <tr><td>Database schema</td><td class="rval">Table <code>temperature_reading</code>. <code>UNIQUE(name, datetime)</code> via Flyway DDL.</td></tr>
  <tr><td>Chunk size</td><td class="rval">100 records (configurable via <code>batch.chunk-size</code>).</td></tr>
  <tr><td>Job scheduling</td><td class="rval">One-time on startup. <code>spring.batch.job.enabled=true</code>.</td></tr>
  </table>
  <h2>3. Implicit assumptions &mdash; Confirmed</h2>
  <ul>
  <li>Header row present. <code>FlatFileItemReader</code> configured with <code>linesToSkip=1</code>.</li>
  <li>Duplicate detection is DB-level only. Writer catches <code>DuplicateKeyException</code> &mdash; no pre-check.</li>
  <li>Unique constraint enforced in Flyway DDL migration, not only application logic.</li>
  <li>Spring Boot 4.0.5 / Spring Batch 6.x (transitive). Job runs as command-line application.</li>
  </ul>
  <h2>4. Edge cases &mdash; Handling defined</h2>
  <table><tr><th style="width:36%">Edge case</th><th>Handling</th></tr>
  <tr><td>Empty CSV (header only)</td><td>Completes: <code>Inserted: 0, Duplicates skipped: 0</code>.</td></tr>
  <tr><td>Duplicates within same file</td><td><code>DuplicateKeyException</code> at write time &mdash; counted, skipped.</td></tr>
  <tr><td>Null / empty fields</td><td>Row skipped + WARN log. Counts toward skip limit.</td></tr>
  <tr><td>Re-running same file</td><td>All records hit duplicate constraint. Job completes (idempotent).</td></tr>
  <tr><td>Extremely large files</td><td>Chunk size 100 bounds memory. No partitioning needed.</td></tr>
  </table>
  <h2>5. Implementation checklist</h2>
  <ul>
  <li>Flyway <code>V1__create_temperature_reading.sql</code> &mdash; table + unique constraint</li>
  <li><code>TemperatureRecord</code> POJO &mdash; name, datetime (LocalDateTime), temp (BigDecimal)</li>
  <li><code>FlatFileItemReader&lt;TemperatureRecord&gt;</code> &mdash; comma-delimited, linesToSkip=1</li>
  <li><code>ItemProcessor</code> &mdash; non-null validation, throws SkippableException</li>
  <li><code>JdbcBatchItemWriter</code> &mdash; INSERT + DuplicateKeyException skip policy</li>
  <li><code>JobExecutionListener</code> &mdash; summary after job completes</li>
  <li>Integration test with Testcontainers MySQL &mdash; insert, duplicate-skip, summary</li>
  </ul>`;
}

function refinedSidebarHTML(){
  const list=ORDER.map(id=>{
    const iss=ISSUES[id];
    return `<div class="ii done"><div class="idot ok"></div><div style="flex:1;min-width:0"><div class="itxt done">&#10003; ${h(iss.title)}</div><div class="imeta"><span class="iref">L${iss.lid+1}</span></div></div></div>`;
  }).join('');
  return `<div class="sbh"><span>Spec complete</span><span style="font-size:10px;padding:1px 5px;border-radius:10px;font-weight:500;background:#EAF3DE;color:#27500A">${TOTAL} / ${TOTAL}</span></div>
  <div class="il">${list}</div>
  <div class="cta">
    <div class="sb-success">
      <div class="sb-stat"><span class="sb-stat-l">Issues resolved</span><span class="sb-stat-v">${TOTAL} / ${TOTAL}</span></div>
      <div class="sb-stat"><span class="sb-stat-l">Missing info gaps</span><span class="sb-stat-v">7 filled</span></div>
      <div class="sb-stat"><span class="sb-stat-l">Ambiguities</span><span class="sb-stat-v">5 clarified</span></div>
      <div class="sb-stat"><span class="sb-stat-l">Edge cases</span><span class="sb-stat-v">5 defined</span></div>
    </div>
  </div>`;
}

renderAll();
setTimeout(()=>selectIssue('db-missing'),200);
</script>
</body>
</html>
